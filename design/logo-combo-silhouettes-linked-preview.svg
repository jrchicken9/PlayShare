    <path d="M 11.55 17.4 C 12.5 16.8 13.6 16.6 13.85 17.2 C 14.15 16.65 15.2 16.85 16.05 17.55 C 16.25 18.2 16.05 22.2 14.9 23.35 C 13.6 23.85 11.65 23.5 11.25 22.5 C 11.05 20.4 11.2 18.3 11.55 17.4 Z"/>
  </g>

