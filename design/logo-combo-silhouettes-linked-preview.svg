<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none" aria-hidden="true">
  <!-- Preview only: combo of silhouettes + dashed teal arc between them (no fading on figures). -->
  <!-- Exploratory vector preview (shipping logo is shared/brand-mark.png). -->
  <defs>
    <linearGradient id="psBrandFaceP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="55%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="psBrandAccentP" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5c5c"/>
      <stop offset="45%" stop-color="#E50914"/>
      <stop offset="100%" stop-color="#9e0610"/>
    </linearGradient>
    <linearGradient id="psBrandSheenP" x1="50%" y1="0%" x2="50%" y2="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#psBrandFaceP)"/>
  <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#psBrandSheenP)" opacity="0.65"/>
  <rect x="2" y="2" width="36" height="36" rx="10" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <rect x="2.5" y="2.5" width="35" height="35" rx="9.5" stroke="url(#psBrandAccentP)" stroke-width="0.85" opacity="0.55"/>

  <!-- Dashed sync arc: only between the two silhouettes (drawn under solid figures). -->
  <path
    d="M 6.8 16.8 C 7.8 11.2 13.2 11.2 14.2 16.8"
    stroke="#4ECDC4"
    stroke-width="0.95"
    stroke-linecap="round"
    stroke-dasharray="1.15 1.35"
    fill="none"
    opacity="0.95"
  />

  <!-- Solid silhouettes (no opacity fade) -->
  <g fill="#4a4a4a">
    <circle cx="7.15" cy="14.35" r="2.05"/>
    <path d="M 4.85 17.4 C 5.8 16.8 6.9 16.6 7.15 17.2 C 7.45 16.65 8.5 16.85 9.35 17.55 C 9.55 18.2 9.35 22.2 8.2 23.35 C 6.9 23.85 4.95 23.5 4.55 22.5 C 4.35 20.4 4.5 18.3 4.85 17.4 Z"/>
  </g>
  <g fill="#4a4a4a">
