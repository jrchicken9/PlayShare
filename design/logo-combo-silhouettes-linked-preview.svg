  <path transform="translate(0.35 2.62)" d="M15.5 12.25C15.5 11.56 16.22 11.1 16.85 11.42L26.2 16.67C26.78 16.97 26.78 17.8 26.2 18.1L16.85 23.35C16.22 23.67 15.5 23.21 15.5 22.52V12.25Z" fill="url(#psBrandAccentP)"/>

  <circle cx="30" cy="10" r="4" fill="#0a0a0a" stroke="#4ECDC4" stroke-width="1.2"/>
  <circle cx="30" cy="10" r="1.6" fill="#4ECDC4" opacity="0.9"/>
