<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join PlayShare Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .join-card {
      background: linear-gradient(160deg, #141414 0%, #0a0a0a 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 40px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .join-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .join-logo img { width: 40px; height: 40px; display: block; }
    .join-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .join-room-code {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #4ECDC4;
      margin: 20px 0;
      padding: 12px 20px;
      background: rgba(78,205,196,0.1);
      border-radius: 12px;
      border: 1px solid rgba(78,205,196,0.2);
    }
    .join-instructions {
      font-size: 14px;
      color: #9a9a9a;
      line-height: 1.6;
      margin-top: 24px;
    }
    .join-instructions strong { color: #f0f0f0; }
    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 28px;
      padding: 14px 28px;
      background: linear-gradient(135deg, #4ECDC4 0%, #3db8b0 100%);
      color: #0a0a0a;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .join-btn:hover { transform: translateY(-2px); }
    .join-error { color: #E50914; margin-top: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="join-card">
    <div class="join-logo">
      <img src="../shared/brand-mark.png" width="40" height="40" alt="" decoding="async" />
      <span class="join-title">PlayShare</span>
    </div>
    <div id="content">
      <p>Joining room…</p>
    </div>
  </div>
  <script src="../shared/streaming-hosts.generated.js"></script>
  <script src="join.js"></script>
</body>
</html>
